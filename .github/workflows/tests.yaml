name: Tests

on:
  pull_request: null
  push:
    branches:
      - main

permissions:
  contents: read

env:
  COMPOSER_CACHE_DIR: /tmp/composer-cache

jobs:
  assets:
    name: Asset build and dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.13'
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test:js
      - run: npm run build

  tests:
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4' ]

    name: PHPUnit - PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # see https://github.com/shivammathur/setup-php
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, mbstring, pdo, curl, pdo_sqlite
          coverage: none
          tools: symfony-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.php-version }}-${{ hashFiles('**/composer.json') }}

      - run: composer install --no-progress --no-interaction

      - run: vendor/bin/phpunit --colors=always
